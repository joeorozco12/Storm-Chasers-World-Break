name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rokit
        run: curl -sSf https://raw.githubusercontent.com/rojo-rbx/rokit/main/scripts/install.sh | bash

      - name: Add Rokit to PATH
        run: echo "$HOME/.rokit/bin" >> "$GITHUB_PATH"

      - name: Install project tools
        run: rokit install

      - name: Check formatting
        run: stylua --check .

      - name: Lint Luau
        run: selene src

      - name: Build place file
        run: mkdir -p build && rojo build default.project.json -o build/StormChasersWorldBreak.rbxlx
